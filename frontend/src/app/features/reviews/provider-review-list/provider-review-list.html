<div class="review-list-container">
  <h3>Customer Reviews</h3>
  
  <div *ngIf="loading" class="loading">Loading reviews...</div>
  
  <div *ngIf="!loading && reviews.length === 0" class="empty-state">
    <p>No reviews found for this provider yet.</p>
  </div>

  <div *ngIf="!loading && reviews.length > 0" class="reviews-grid">
    <div class="review-card" *ngFor="let review of reviews">
      <div class="review-header">
        <div class="customer-info">
          <div class="avatar">C{{ review.customer_id }}</div>
          <div>
            <h4>Customer {{ review.customer_id }}</h4>
            <span class="date">{{ review.created_at | date:'mediumDate' }}</span>
          </div>
        </div>
        <app-rating-display [rating]="review.rating" [showCount]="false"></app-rating-display>
      </div>
      <p class="review-comment">{{ review.comment || 'No comment provided.' }}</p>
    </div>
  </div>
</div>
