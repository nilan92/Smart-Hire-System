<app-page-header title="Customer Profile" subtitle="Manage the account details used across Smart Hire." />

@if (loading) {
  <app-loading-spinner label="Loading profile..." />
} @else {
  <section class="profile-panel">
    <div class="details-grid">
      <div>
        <span class="label">User ID</span>
        <strong>{{ user?.id }}</strong>
      </div>
      <div>
        <span class="label">Email</span>
        <strong>{{ user?.email }}</strong>
      </div>
      <div>
        <span class="label">Role</span>
        <strong>{{ user?.role }}</strong>
      </div>
      <div>
        <span class="label">Account status</span>
        <strong>{{ user?.status }}</strong>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="save()" novalidate>
      <label>
        Full name
        <input type="text" formControlName="full_name" autocomplete="name" />
        @if (form.controls.full_name.touched && form.controls.full_name.invalid) {
          <small>Name must be at least 2 characters.</small>
        }
      </label>

      <label>
        Phone
        <input type="tel" formControlName="phone" autocomplete="tel" />
      </label>

      @if (message) {
        <app-error-message [message]="message.includes('Unable') ? message : ''" />
        @if (!message.includes('Unable')) {
          <p class="success">{{ message }}</p>
        }
      }

      <button type="submit" [disabled]="saving">{{ saving ? 'Saving...' : 'Save changes' }}</button>
    </form>
  </section>
}
